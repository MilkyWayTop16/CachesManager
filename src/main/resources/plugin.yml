name: CachesManager
version: 1.4.2
main: org.gw.cachesmanager.CachesManager
author: [vkusniy_milkyway]
api-version: 1.16
softdepend: [ProtocolLib, PacketEvents, DecentHolograms, FancyHolograms]
commands:
  cachesmanager:
    aliases: [cm]
permissions:
  cachesmanager.createcache:
    default: op
  cachesmanager.menu:
    default: op
  cachesmanager.givekey:
    default: op
  cachesmanager.deletecache:
    default: op
  cachesmanager.listcaches:
    default: op
  cachesmanager.reload:
    default: op
  cachesmanager.cancel:
    default: op
  cachesmanager.opencache:
    default: true
  cachesmanager.openmenu.global-menu:
    default: op
  cachesmanager.admin:
    default: op