# Плейсхолдеры в display-name / lore / title
# Общие:
#   {name-cache}              — имя тайника
#   {player}                  — ник кликнувшего (в click-commands)
#   {current-page}            — текущая страница
#   {max-pages}               — максимум страниц
#   {unbreakable-status}      — Включена / Выключена (неразрушимость)
#   {animation-name}          — текущая анимация
# Голограмма:
#   {hologram-status}         — Включена / Выключена
#   {hologram-offset-x}       — смещение по оси X
#   {hologram-offset-y}       — смещение по оси Y
#   {hologram-offset-z}       — смещение по оси Z
# Ключ:
#   {key-name}                — название ключа
#   {key-material}            — материал ключа
#   {key-lore}                — лор ключа (разворачивается в несколько строк)
#   {key-glow-status}         — Включено / Выключено
#   {key-cmd}                 — Custom Model Data
#   {key-flags}               — флаги ключа
# Лут / шансы:
#   {chance}                  — шанс предмета (%)
# История:
#   {dropped-by}              — ник игрока
#   {dropped-at}              — дата/время выпадения
# Статистика (stats-menu.yml):
#   {cache-opens-total}       — всего открытий
#   {cache-opens-7d}          — открытий за 7 дней
#   {cache-opens-per-day-avg} — среднее открытий в день
#   {cache-avg-opens-per-player} — среднее открытий на игрока
#   {cache-peak-hour}         — пиковый час
#   {created-date}            — дата создания
#   {first-opened}            — первое открытие
#   {last-opened}             — последнее открытие
#   {longest-drought}         — самый длинный перерыв
#   {shortest-interval}       — самый короткий интервал
#   {most-active-day}         — самый активный день
#   {rank} {player} {count}   — строка топа игроков
# Также поддерживаются плейсхолдеры PlaceholderAPI (%...%), если плагин установлен.

