    - 0-8
    - 9-17
    - 18-26
    - 27-35
    - 36-44

loot-item-settings:
  lore:
    - " "
    - " &#FFFF00◆ &fШанс выпадения: &#FFFF00{chance}%"
    - " "
    - " &f(&#FFFF00Пкм&f) - &#00FF00Увеличить &fна &#00FF001% "
    - " &f(&#FFFF00Лкм&f) - &#FF000AУменьшить &fна &#FF000A1% "
