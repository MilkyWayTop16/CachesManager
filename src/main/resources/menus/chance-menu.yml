    - ""
  right-click-commands:
    - "[increase-chance] 1"
    - "[sound] BLOCK_LEVER_CLICK 1 1"
  left-click-commands:
    - "[reduce-chance] 1"
    - "[sound] BLOCK_LEVER_CLICK 1 1"
  shift-right-click-commands:
    - "[increase-chance] 10"
    - "[sound] BLOCK_LEVER_CLICK 1 1"
  shift-left-click-commands:
    - "[reduce-chance] 10"
    - "[sound] BLOCK_LEVER_CLICK 1 1"

