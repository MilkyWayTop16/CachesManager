menu:
  title: "&8◆ История выпадений тайника «{name-cache}» | {current-page}/{max-pages}"
  size: 54
  max-pages: 5

loot:
  slots:
    - 0-8
    - 9-17
    - 18-26
    - 27-35
    - 36-44

history-item-settings:
  lore:
    - " "
    - " &#FFFF00◆ &fВыбит игроком: &#FFFF00{dropped-by}"
    - " &#FFFF00◆ &fДата и время: &#FFFF00{dropped-at}"
    - " "

items:
  next-page:
    material: ARROW
    slot: 50
    display-name: "&r "
    lore:
      - " &#C8C8C8[→] Следующая страница "
      - " "
    click-commands:
      - "[sound] BLOCK_LEVER_CLICK 1 1"
      - "[next-page]"
  last-page:
    material: ARROW
    slot: 48
    display-name: "&r "
    lore:
      - " &#C8C8C8[←] Предыдущая страница "
      - " "
    click-commands:
      - "[sound] BLOCK_LEVER_CLICK 1 1"
      - "[previous-page]"

  # === НОВАЯ КНОПКА ОБНОВЛЕНИЯ В СЛОТЕ 49 ===
  refresh-history:
    material: CLOCK
    slot: 49
    display-name: " &#FFFF00▶ &fОбновить историю"
    lore:
      - ""
      - "  &#FFFF00◆ &fНажмите, чтобы мгновенно &#FFFF00обновить &fсписок предметов "
      - ""
    click-commands:
      - "[sound] BLOCK_LEVER_CLICK 1 1"
      - "[update-menu]"

  steclo:
    material: GRAY_STAINED_GLASS_PANE
    slots:
      - 46-47
      - 51-52
    display-name: "&r "
  back:
    material: YELLOW_STAINED_GLASS_PANE
    slot: 53
    display-name: "&r "
    lore:
      - " &#FFFF00[←] Назад "
      - " "
    click-commands:
      - "[sound] BLOCK_LEVER_CLICK 1 1"
      - "[open-menu] global-menu.yml"
  close:
    material: RED_STAINED_GLASS_PANE
    slot: 45
    display-name: "&r "
    lore:
      - " &#FF9B00[✘] Закрыть "
      - " "
    click-commands:
      - "[sound] BLOCK_LEVER_CLICK 1 1"
      - "[close-menu]"

  steclo-black:
    material: BLACK_STAINED_GLASS_PANE
    slots:
      - 0
      - 9
      - 36
      - 8
      - 17
      - 44
    display-name: "&r "
  steclo-gray:
    material: GRAY_STAINED_GLASS_PANE
    slots:
      - 10
      - 19
      - 28
      - 37
      - 16
      - 25
      - 34
      - 43
    display-name: "&r "
  chain:
    material: CHAIN
    slots:
      - 18
      - 27
      - 26
      - 35
    display-name: "&r "