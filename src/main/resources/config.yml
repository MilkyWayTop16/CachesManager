    invalid-coordinates:
      - "[message] &#FB8808▶ Стоп! &fКоординаты &#FB8808должны быть &fчислами!"
      - "[sound] BLOCK_ANVIL_LAND"
    invalid-world:
      - "[message] &#FB8808▶ Стоп! &fМир &#FB8808{world} &fне найден!"
      - "[sound] BLOCK_ANVIL_LAND"
    break-forbidden:
      - "[message] &#FB8808▶ Стоп! &fТайник &#FB8808«{name-cache}» &fломать нельзя!"
      - "[sound] BLOCK_ANVIL_LAND"
    delete:
      confirm:
        - "[message] "
        - "[message] &#FB8808◆ &fВы уверены, что хотите &#FB8808удалить &fтайник &#FB8808«{name-cache}»&f?"
        - "[message] "
        - "[message]      {confirm-button}       {cancel-button}"
        - "[message] "
        - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP"
      confirm-buttons:
        confirm:
          text: "&#00FF11[Подтвердить]"
          hover: "&#00FF11◆ &fНажмите, чтобы &#00FF11удалить &fтайник &#00FF11«{name-cache}»"
        cancel:
          text: "&#FB8808[Отменить]"
          hover: "&#FB8808◆ &fНажмите, чтобы &#FB8808отменить &fудаление тайника &#FB8808«{name-cache}»"
      success:
        - "[message] &#FFFF00◆ &fТайник &#FFFF00«{name-cache}» &fуспешно удалён!"
        - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP"
      cancelled:
        - "[message] &#FFFF00◆ &fУдаление тайника &#FFFF00«{name-cache}» &fотменено!"
        - "[sound] ENTITY_EXPERIENCE_ORB_PICKUP"

  interaction:
