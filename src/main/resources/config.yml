          - "[message] &#FFFF00◆ &fТекущее: &#FFFF00{current-y}"
          - "[message] "
          - "[message] &#FFFF00◆ &fДля отмены напишите &#FFFF00/cm cancel"
          - "[sound] BLOCK_NOTE_BLOCK_PLING"
      offset-z:
