      removed:
        - "[message] &#FFFF00◆ &fФлаг &#FFFF00{flag} &fуспешно удалён у ключа!"
        - "[sound] BLOCK_NOTE_BLOCK_HAT"
      already-exists:
        - "[message] &#FB8808▶ &fФлаг &#FFFF00{flag} &fуже установлен!"
